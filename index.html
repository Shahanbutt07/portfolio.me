    function useScrollReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    function useCursor() {
      useEffect(() => {
        const dot  = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        if (!dot || !ring) return;
        let mx=0, my=0, rx=0, ry=0, raf;
        const onMove = e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; };
        const animRing = () => {
          rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
          ring.style.left=rx+'px'; ring.style.top=ry+'px';
          raf = requestAnimationFrame(animRing);
        };
        document.addEventListener('mousemove', onMove);
        animRing();
        const addHover = () => { dot.classList.add('cursor-hover'); ring.classList.add('cursor-hover'); };
        const rmHover  = () => { dot.classList.remove('cursor-hover'); ring.classList.remove('cursor-hover'); };
        document.querySelectorAll('a,button').forEach(el => {
          el.addEventListener('mouseenter', addHover);
          el.addEventListener('mouseleave', rmHover);
        });
        return () => { document.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
      }, []);
    }

    function useMeshCanvas() {
      useEffect(() => {
        const canvas = document.getElementById('mesh-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W, H, mx=0.5, my=0.5, raf;
        const resize = () => { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; };
        resize();
        window.addEventListener('resize', resize);
        document.addEventListener('mousemove', e => { mx=e.clientX/window.innerWidth; my=e.clientY/window.innerHeight; });
        const orbs = [
          { x:0.15, y:0.2,  r:0.45, c:[59,130,246],  speed:0.0008 },
          { x:0.8,  y:0.15, r:0.40, c:[139,92,246],  speed:0.0012 },
          { x:0.5,  y:0.75, r:0.35, c:[6,182,212],   speed:0.001  },
          { x:0.85, y:0.8,  r:0.30, c:[16,185,129],  speed:0.0009 },
        ];
        let t=0;
        const draw = () => {
          t++;
          ctx.clearRect(0,0,W,H);
          orbs.forEach((o,i) => {
            const ox = o.x + Math.sin(t*o.speed + i) * 0.12 + (mx-0.5)*0.06;
            const oy = o.y + Math.cos(t*o.speed + i*1.3) * 0.1 + (my-0.5)*0.06;
            const grad = ctx.createRadialGradient(ox*W, oy*H, 0, ox*W, oy*H, o.r*Math.max(W,H));
            grad.addColorStop(0, `rgba(${o.c[0]},${o.c[1]},${o.c[2]},0.18)`);
            grad.addColorStop(1, `rgba(${o.c[0]},${o.c[1]},${o.c[2]},0)`);
            ctx.beginPath();
            ctx.fillStyle = grad;
            ctx.arc(ox*W, oy*H, o.r*Math.max(W,H), 0, Math.PI*2);
            ctx.fill();
          });
          raf = requestAnimationFrame(draw);
        };
        draw();
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
      }, []);
    }
