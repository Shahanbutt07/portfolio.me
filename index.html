    /* ── HERO NAME FIX ──────────────────────────────────────
        .hl MUST be overflow:visible so -webkit-background-clip
        gradient text on the "Shahan" line is never clipped.
        The char animation starts at opacity:0 + translateY(60px);
        overflow:hidden was eating the whole line during the lift.
    ─────────────────────────────────────────────────────── */
    .hero-h1 {
      line-height: 1.1 !important;
      letter-spacing: -4px;
    }
    .hl {
      display: block !important;
      overflow: visible !important;  /* CRITICAL — do not change to hidden */
      padding-bottom: 6px;
    }
    .hl.grad {
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hl.line-stroke {
      color: transparent;
      -webkit-text-stroke: 2px rgba(241,245,249,0.35);
    }
    /* Each char: animation plays fully before considered done */
    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(60px) rotateX(-40deg);
      animation: charIn 0.6s cubic-bezier(.23,1,.32,1) forwards;
      /* fill-mode: forwards keeps opacity:1 after animation ends */
      animation-fill-mode: forwards;
    }
    @keyframes charIn {
      to { opacity: 1; transform: translateY(0) rotateX(0deg); }
    }
  </style>

    /* ════════════════════════════════════════════
        3D GLOBE COMPONENT
    ════════════════════════════════════════════ */
    function SkillsGlobe({ skills }) {
      const canvasRef = useRef(null);
      const stateRef  = useRef({
        items: [], rotX: 0.3, rotY: 0, velX: 0, velY: 0.0008,
        dragging: false, lastX: 0, lastY: 0, lastMX: 0, lastMY: 0,
        hovered: -1, images: [], isInteracted: false
      });
      const rafRef = useRef(null);

      const initItems = useCallback(() => {
        const n = skills.length;
        const golden = Math.PI * (3 - Math.sqrt(5));
        return skills.map((sk, i) => {
          const y   = 1 - (i / (n - 1)) * 2;
          const r   = Math.sqrt(1 - y * y);
          const th  = golden * i;
          return { ...sk, ox: Math.cos(th)*r, oy: y, oz: Math.sin(th)*r };
        });
      }, [skills]);

      useEffect(() => {
        const imgs = skills.map(sk => {
          const im = new Image();
          im.crossOrigin = "anonymous";
          im.src = sk.img;
          return im;
        });
        stateRef.current.images = imgs;
        stateRef.current.items  = initItems();
      }, [skills, initItems]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          const size = Math.min(canvas.parentElement.clientWidth, 560);
          canvas.width  = size;
          canvas.height = size;
        };
        resize();
        window.addEventListener('resize', resize);

        const draw = () => {
          const s   = stateRef.current;
          const W   = canvas.width, H = canvas.height;
          const cx  = W / 2, cy = H / 2;
          const r   = Math.min(W, H) / 2 * 0.82;

          ctx.clearRect(0, 0, W, H);

          if (!s.dragging && !s.isInteracted) {
            s.velX *= 0.98;
            s.velY  = s.velY * 0.98 + 0.0008;
          } else if (!s.dragging) {
            s.velX *= 0.95;
            s.velY *= 0.95;
            if (Math.abs(s.velY) < 0.0008) {
              s.velY = 0.0008;
              s.isInteracted = false;
            }
          }
          s.rotX += s.velX;
          s.rotY += s.velY;

          const cosX = Math.cos(s.rotX), sinX = Math.sin(s.rotX);
          const cosY = Math.cos(s.rotY), sinY = Math.sin(s.rotY);

          const project = (ox, oy, oz) => {
            const x1 = ox * cosY - oz * sinY;
            const z1 = ox * sinY + oz * cosY;
            const y2 = oy * cosX - z1 * sinX;
            const z2 = oy * sinX + z1 * cosX;
            return { sx: cx + x1 * r, sy: cy + y2 * r, depth: z2 };
          };

          const drawCircle = (axis) => {
            ctx.beginPath();
            for (let a = 0; a <= Math.PI * 2; a += 0.05) {
              let ox, oy, oz;
              if (axis === 0) { ox = Math.cos(a); oy = Math.sin(a); oz = 0; }
              else if (axis === 1) { ox = Math.cos(a); oy = 0; oz = Math.sin(a); }
              else { ox = 0; oy = Math.cos(a); oz = Math.sin(a); }
              const p = project(ox, oy, oz);
              a === 0 ? ctx.moveTo(p.sx, p.sy) : ctx.lineTo(p.sx, p.sy);
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(59,130,246,0.08)';
            ctx.lineWidth   = 1;
            ctx.stroke();
          };
          drawCircle(0); drawCircle(1); drawCircle(2);

          const projected = s.items.map((item, i) => {
            const p = project(item.ox, item.oy, item.oz);
            return { ...item, ...p, idx: i };
          }).sort((a, b) => a.depth - b.depth);

          const mx = s.hovered;

          projected.forEach(item => {
            const { sx, sy, depth, idx } = item;
            const t     = (depth + 1) / 2;
            const scale = 0.45 + t * 0.65;
            const alpha = 0.25 + t * 0.75;
            const isHov = idx === mx;

            const boxW  = isHov ? 84 : 68;
            const boxH  = isHov ? 84 : 68;
            const imgS  = isHov ? 34 : 26;
            const fSz   = isHov ? 10 : 8.5;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(sx, sy);
            ctx.scale(scale, scale);

            const bw = boxW, bh = boxH;
            const br = 14;
            ctx.beginPath();
            ctx.roundRect(-bw/2, -bh/2, bw, bh, br);

            if (isHov) {
              ctx.fillStyle = 'rgba(59,130,246,0.22)';
              ctx.strokeStyle = 'rgba(59,130,246,0.8)';
              ctx.lineWidth   = 1.5;
            } else {
              ctx.fillStyle = `rgba(11,16,28,${0.7 + t * 0.25})`;
              ctx.strokeStyle = `rgba(255,255,255,${0.06 + t * 0.1})`;
              ctx.lineWidth   = 1;
            }
            ctx.fill();
            ctx.stroke();

            const img = s.images[item.idx !== undefined ? item.idx : 0];
            if (img && img.complete && img.naturalWidth) {
              ctx.drawImage(img, -imgS/2, -bh/2 + 10, imgS, imgS);
            }

            ctx.fillStyle   = isHov ? '#fff' : `rgba(241,245,249,${0.6 + t * 0.4})`;
            ctx.font        = `${fSz}px 'Outfit', sans-serif`;
            ctx.textAlign   = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText(item.label, 0, bh/2 - 6);

            ctx.restore();
          });

          ctx.save();
          ctx.globalAlpha = 0.3;
          ctx.fillStyle   = 'rgba(148,163,184,1)';
          ctx.font        = '11px Outfit, sans-serif';
          ctx.textAlign   = 'center';
          ctx.fillText('⊕ drag to explore', W/2, H - 10);
          ctx.restore();

          rafRef.current = requestAnimationFrame(draw);
        };

        draw();

        const getPos = e => {
          const rect = canvas.getBoundingClientRect();
          if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
          return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        };

        const onDown = e => {
          const { x, y } = getPos(e);
          stateRef.current.dragging = true;
          stateRef.current.isInteracted = true;
          stateRef.current.lastX = x;
          stateRef.current.lastY = y;
          stateRef.current.velX = 0;
          stateRef.current.velY = 0;
        };

        const onMove = e => {
          e.preventDefault();
          const { x, y } = getPos(e);
          const s = stateRef.current;
          if (s.dragging) {
            const dx = x - s.lastX;
            const dy = y - s.lastY;
            s.velY = dx * 0.004;
            s.velX = dy * 0.004;
            s.rotY += dx * 0.004;
            s.rotX += dy * 0.004;
            s.lastX = x;
            s.lastY = y;
          }
          const W = canvas.width, H = canvas.height;
          const cx = W/2, cy = H/2;
          const r  = Math.min(W,H)/2 * 0.82;
          const cosX = Math.cos(s.rotX), sinX = Math.sin(s.rotX);
          const cosY = Math.cos(s.rotY), sinY = Math.sin(s.rotY);
          let best = -1, bestD = 999;
          s.items.forEach((item, i) => {
            const x1 = item.ox * cosY - item.oz * sinY;
            const z1 = item.ox * sinY + item.oz * cosY;
            const y2 = item.oy * cosX - z1 * sinX;
            const sx = cx + x1 * r;
            const sy = cy + y2 * r;
            const d  = Math.hypot(x - sx, y - sy);
            if (d < 44 && d < bestD) { bestD = d; best = i; }
          });
          s.hovered = best;
        };

        const onUp = () => { stateRef.current.dragging = false; };
        const onLeave = () => { stateRef.current.hovered = -1; };

        canvas.addEventListener('mousedown',  onDown);
        canvas.addEventListener('mousemove',  onMove);
        canvas.addEventListener('mouseup',    onUp);
        canvas.addEventListener('mouseleave', onLeave);
        canvas.addEventListener('touchstart', onDown, { passive:true });
        canvas.addEventListener('touchmove',  onMove, { passive:false });
        canvas.addEventListener('touchend',   onUp);

        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('resize', resize);
          canvas.removeEventListener('mousedown',  onDown);
          canvas.removeEventListener('mousemove',  onMove);
          canvas.removeEventListener('mouseup',    onUp);
          canvas.removeEventListener('mouseleave', onLeave);
          canvas.removeEventListener('touchstart', onDown);
          canvas.removeEventListener('touchmove',  onMove);
          canvas.removeEventListener('touchend',   onUp);
        };
      }, []);

      return (
        <div className="globe-wrap">
          <canvas ref={canvasRef} className="globe-canvas" />
        </div>
      );
    }

    /* ════════════════════════════════════════════
        HOOKS
    ════════════════════════════════════════════ */
    function useScrollReveal() {
      useEffect(() => {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.1, rootMargin:'0px 0px -50px 0px' });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

    function useCursor() {
      useEffect(() => {
        const dot  = document.getElementById('cursor');
        const ring = document.getElementById('cursor-ring');
        if (!dot || !ring) return;
        let mx=0,my=0,rx=0,ry=0,raf;
        const move = e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; };
        const anim = () => {
          rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
          ring.style.left=rx+'px'; ring.style.top=ry+'px';
          raf=requestAnimationFrame(anim);
        };
        document.addEventListener('mousemove', move);
        anim();
        const addH=()=>{dot.classList.add('cursor-hover');ring.classList.add('cursor-hover');};
        const rmH =()=>{dot.classList.remove('cursor-hover');ring.classList.remove('cursor-hover');};
        document.querySelectorAll('a,button,[data-hover]').forEach(el=>{
          el.addEventListener('mouseenter',addH);
          el.addEventListener('mouseleave',rmH);
        });
        return ()=>{ document.removeEventListener('mousemove',move); cancelAnimationFrame(raf); };
      },[]);
    }

    function useMeshBg() {
      useEffect(() => {
        const canvas = document.getElementById('mesh-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W,H,mx=0.5,my=0.5,raf,t=0;
        const resize=()=>{ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; };
        resize();
        window.addEventListener('resize',resize);
        document.addEventListener('mousemove',e=>{ mx=e.clientX/window.innerWidth; my=e.clientY/window.innerHeight; });
        const orbs=[
          {x:.15,y:.2, r:.5,c:[59,130,246], s:.0007},
          {x:.8, y:.15,r:.42,c:[139,92,246],s:.001},
          {x:.5, y:.78,r:.38,c:[6,182,212], s:.0009},
          {x:.85,y:.8, r:.32,c:[16,185,129],s:.0008},
        ];
        const draw=()=>{
          t++;
          ctx.clearRect(0,0,W,H);
          orbs.forEach((o,i)=>{
            const ox=o.x+Math.sin(t*o.s+i)*.1+(mx-.5)*.05;
            const oy=o.y+Math.cos(t*o.s+i*1.3)*.08+(my-.5)*.05;
            const g=ctx.createRadialGradient(ox*W,oy*H,0,ox*W,oy*H,o.r*Math.max(W,H));
            g.addColorStop(0,`rgba(${o.c},0.18)`);
            g.addColorStop(1,`rgba(${o.c},0)`);
            ctx.fillStyle=g;
            ctx.fillRect(0,0,W,H);
          });
          raf=requestAnimationFrame(draw);
        };
        draw();
        return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',resize); };
      },[]);
    }

    function useNavScroll() {
      const [scrolled,setScrolled]=useState(false);
      const [active,setActive]=useState('');
      useEffect(()=>{
        const fn=()=>{
          setScrolled(window.scrollY>60);
          const ids=['hero','skills','experience','projects','contact'];
          let cur='';
          ids.forEach(id=>{ const el=document.getElementById(id); if(el&&window.scrollY>=el.offsetTop-160) cur=id; });
          setActive(cur);
        };
        window.addEventListener('scroll',fn);
        return ()=>window.removeEventListener('scroll',fn);
      },[]);
      return {scrolled,active};
    }

                  style={{ animationDelay: `${(li * 8 + ci) * 0.04 + 0.2}s` }}
                >
                  {ch === ' ' ? '\u00A0' : ch}
                </span>
              ))}
            </span>
          ))}
        </h1>
      );
    }

    function Ticker() {
      return (
        <div className="ticker-section">
          <div className="ticker-track">
            {[...TICKER_WORDS,...TICKER_WORDS].map((w,i)=>(
              <div key={i} className="ticker-item">
                <span className="ticker-word">{w}</span>
                <span className="ticker-dot"/>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function TLCard({ item }) {
      return (
        <>
          <div className="tl-meta">
            <span className="tl-date">{item.period}</span>
            {item.badge && <span className={`tl-badge ${item.badgeClass}`}>{item.badge}</span>}
          </div>
          <div className="tl-company">{item.company}</div>
          <div className="tl-role"><span className="role-dot"/>{item.role}</div>
          <p className="tl-desc">{item.desc}</p>
          <div className="tl-tags">{item.tags.map(t=><span key={t} className="tl-tag">{t}</span>)}</div>
          {item.link && <a href={item.link} target="_blank" rel="noopener" className="tl-link">{item.linkText}</a>}
        </>
      );
    }

    function ProjCard({ p }) {
      return (
        <div className={`proj-card ${p.feat?'proj-feat':''} reveal`}>
          <div className="proj-img">
            <img src={p.img} alt={p.title}/>
            <div className="proj-overlay">
              <div className="proj-overlay-content">
                <div className="proj-overlay-title">{p.title}</div>
                <div className="proj-overlay-links">
                  {p.links.map(l=><a key={l.label} href={l.href} target="_blank" rel="noopener"
                               className={`overlay-btn ${l.ghost?'overlay-btn-ghost':''}`}>{l.label}</a>)}
                </div>
              </div>
            </div>
            <span className={`proj-chip ${p.chipClass}`}>{p.chip}</span>
          </div>
          <div className="proj-body">
            <div className="proj-idx">Project {String(p.id).padStart(2,'0')}</div>
            <h3>{p.title}</h3>
            <p>{p.desc}</p>
            <div className="proj-tags">{p.tags.map(t=><span key={t} className="proj-tag">{t}</span>)}</div>
            <div className="proj-foot">
              {p.links.map(l=><a key={l.label} href={l.href} target="_blank" rel="noopener"
                               className={`plink ${l.ghost?'plink-ghost':''}`}>{l.label}</a>)}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
        APP
    ════════════════════════════════════════════ */
    function App() {
      useScrollReveal();
      useCursor();
      useMeshBg();
      const {scrolled,active}=useNavScroll();

      return (
        <>
          <div id="cursor"/>
          <div id="cursor-ring"/>
          <canvas id="mesh-canvas"/>

          {/* ── NAV ── */}
          <header className={`nav ${scrolled?'scrolled':''}`}>
            <div className="nav-inner">
              <a href="#hero" className="nav-logo"><span className="nb">[</span>MSB<span className="nb">]</span></a>
              <nav className="nav-links">
                {['hero','skills','experience','projects','contact'].map(id=>(
                  <a key={id} href={`#${id}`} className={`nav-link ${active===id?'active':''}`}>
                    {id==='hero'?'About':id.charAt(0).toUpperCase()+id.slice(1)}
                  </a>
                ))}
              </nav>
              <a href="mailto:shahansqb@gmail.com" className="nav-hire">
                <span className="hire-dot"/>Available — Hire Me
              </a>
            </div>
          </header>

          {/* ── HERO ── */}
          <section className="hero" id="hero">
            <div className="hero-bg-text" aria-hidden="true">AI</div>
            <div className="hero-content container">
              <div className="hero-left">
                <div className="hero-status">
                  <span className="status-pulse"/>
                  Open to Work · Available Now
                </div>
                <HeroTitle/>
                <p className="hero-sub">
                  AI Engineer with 1+ year of production experience building LLM-powered chatbots,
                  RAG pipelines, and real-time Computer Vision systems. Strong Python and ML/DL
                  fundamentals with hands-on experience in LangChain, TensorFlow, and FastAPI.
                </p>
                <div className="btn-row">
                  <a href="#projects" className="btn-primary"><span>View My Work</span><span className="btn-arrow">→</span></a>
                  <a href="mailto:shahansqb@gmail.com" className="btn-secondary">Let's Talk</a>
                </div>
               <div className="hero-stats">
                {[
                  {val:"1+",    key:"Years\nExperience"},
                  {val:"3+",    key:"Live\nDeployments"},
                  {val:"150+",  key:"Daily AI\nInteractions"},
                  {val:"10+",   key:"Projects\nCompleted"},
                ].map((s, i) => (
    /* Use the index 'i' as the key instead of 's.val' */
                  <React.Fragment key={i}> 
                    {i > 0 && <div className="hstat-div"/>}
                    <div className="hstat">
                      <div className="hstat-val">{s.val}</div>
                      <div className="hstat-key">{s.key}</div>
                    </div>
                  </React.Fragment>
                ))}
              </div>
                    </React.Fragment>
                  ))}
                </div>
              </div>
              <div className="hero-right">
                <div className="photo-card">
                  <div className="float-chip fc-1">🤖 AI Engineer</div>
                  <div className="float-chip fc-2">👁 Computer Vision</div>
                  <div className="float-chip fc-3">🧠 LLM / RAG</div>
                  <div className="photo-inner">
                    <img src="tech_shahan.jpeg" alt="Muhammad Shahan Butt"/>
                    <div className="photo-gradient"/>
                    <div className="photo-meta">
                      <div>
                        <div className="photo-name">Muhammad Shahan Butt</div>
                        <div className="photo-role">AI/ML &amp; Computer Vision Engineer</div>
                      </div>
                      <div className="photo-badge">Lahore, PK</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ── TICKER ── */}
          <Ticker/>

          {/* ── SKILLS ── */}
          <section className="skills-section" id="skills">
            <div className="container">
              <div className="section-head reveal">
                <div className="eyebrow">Expertise</div>
                <h2 className="section-title">Technical <span className="grad">Mastery</span></h2>
                <p className="section-sub">Three pillars — all production-tested, all deployed live.</p>
              </div>
              <div className="skills-layout">
                <div className="globe-side reveal">
                  <SkillsGlobe skills={GLOBE_SKILLS}/>
                  <div className="globe-hint">Drag to rotate · Hover to explore</div>
                </div>
                <div className="cards-side">
                  {SKILLS_CARDS.map((sk,i)=>(
                    <div key={sk.num} className={`skill-card reveal d${i+1}`}
                      style={{

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
